name: Deploy to unihost via FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Copy .htaccess into build output
        run: |
          cp -f client/public/.htaccess dist/public/.htaccess
          ls -la dist/public/
          echo "--- .htaccess contents ---"
          cat dist/public/.htaccess

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: "./"
          local-dir: ./dist/public/
          protocol: ftp
          port: 21
          log-level: verbose
          dangerous-clean-slate: false
          state-name: .ftp-deploy-force-${{ github.run_id }}.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.manus-logs/**
            **/__manus__/**

name: Master Deploy 🚀

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # Устанавливаем pnpm, так как твой проект на нём
      - name: Install pnpm 📦
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Устанавливаем зависимости и собираем именно КЛИЕНТСКУЮ часть
      - name: Install and Build Frontend 🔧
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      # Отправляем готовую папку dist на сервер
      - name: Deploy to Unihost 📦
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          # Ищем папку dist везде (в корне или в client)
          source: "dist/*,client/dist/*"
          target: "www/ciacademy.kz"
          strip_components: 2 # Это уберет лишние вложенные папки при копировании

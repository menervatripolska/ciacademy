name: Final Deploy 🚀

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build 🔧
        run: |
          npm install --legacy-peer-deps
          # Пробуем собрать проект
          npm run build || echo "Build command failed or not needed"

      - name: Deploy via SCP 📦
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          # Мы берем ВСЕ файлы, которые получились после сборки
          # Если папки dist нет, он возьмет файлы из корня
          source: "dist/*,build/*,out/*,index.html,assets/*"
          target: "www/ciacademy.kz"
          strip_components: 1 # Убирает папки dist/ или build/ при копировании

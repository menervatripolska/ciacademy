<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Converter</title>
<script src="/jszip.min.js"></script>
<style>
body{font-family:system-ui,sans-serif;padding:20px;max-width:900px;margin:0 auto;background:#0b0f1a;color:#e6edf3}
h1{font-size:18px;margin:0 0 8px}
p{margin:0 0 12px;font-size:14px;color:#9fb2c8}
button{background:#7c5cff;color:#fff;border:0;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;margin:8px 0}
button:hover{background:#8d72ff}
#f{margin:8px 0}
#status{white-space:pre-wrap;font-size:12px;padding:10px;background:#111826;border-radius:6px;max-height:200px;overflow:auto;margin:10px 0}
textarea{width:100%;min-height:300px;background:#0a0e17;color:#e6edf3;border:1px solid #253048;border-radius:6px;padding:10px;font-family:monospace;font-size:11px;box-sizing:border-box}
</style>
</head>
<body>
<h1>Lesson uploader for Nova</h1>
<p>1) Select all 8 .docx files at once. 2) Wait for DONE. 3) Click COPY ALL and paste the result into chat.</p>
<input type="file" id="f" multiple accept=".docx">
<div id="status">Waiting for files...</div>
<button id="copyBtn" style="display:none">COPY ALL</button>
<textarea id="json" style="display:none" readonly></textarea>
<script>
window.results = {};
async function parseDocx(file){
  const buf = await file.arrayBuffer();
  const zip = await JSZip.loadAsync(buf);
  const xml = await zip.file("word/document.xml").async("string");
  const doc = new DOMParser().parseFromString(xml, "application/xml");
  const ps = doc.getElementsByTagName("w:p");
  const out = [];
  for (const p of ps) {
    const runs = p.getElementsByTagName("w:t");
    let t = "";
    for (const r of runs) t += r.textContent || "";
    const ps1 = p.getElementsByTagName("w:pStyle")[0];
    const sv = ps1 && ps1.getAttribute("w:val");
    if (sv && /Heading1/i.test(sv)) out.push("# " + t);
    else if (sv && /Heading2/i.test(sv)) out.push("## " + t);
    else if (sv && /Heading3/i.test(sv)) out.push("### " + t);
    else if (t.trim()) out.push(t);
  }
  return out.join("\n\n");
}
document.getElementById("f").addEventListener("change", async (e) => {
  const st = document.getElementById("status");
  st.textContent = "Parsing " + e.target.files.length + " files...\n";
  window.results = {};
  for (const file of e.target.files) {
    try {
      const text = await parseDocx(file);
      window.results[file.name] = text;
      st.textContent += "[OK] " + file.name + " -> " + text.length + " chars\n";
    } catch (err) {
      st.textContent += "[ERR] " + file.name + ": " + err.message + "\n";
    }
  }
  st.textContent += "DONE";
  const ta = document.getElementById("json");
  ta.value = JSON.stringify(window.results);
  ta.style.display = "block";
  const btn = document.getElementById("copyBtn");
  btn.style.display = "inline-block";
});
document.getElementById("copyBtn").addEventListener("click", async () => {
  const ta = document.getElementById("json");
  try {
    await navigator.clipboard.writeText(ta.value);
    document.getElementById("copyBtn").textContent = "COPIED!";
  } catch(e) {
    ta.select(); document.execCommand("copy");
    document.getElementById("copyBtn").textContent = "COPIED!";
  }
});
</script>
</body>
</html>

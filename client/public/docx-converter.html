<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Crypto OS — парсер уроков</title>
<style>
  *{box-sizing:border-box}
  body{font-family:ui-sans-serif,system-ui,sans-serif;margin:0 auto;padding:2rem;background:#0a0a0a;color:#eaeaea;max-width:820px}
  h1{font-size:1.5rem;margin:0 0 .5rem;color:#fff}
  .sub{color:#888;margin:0 0 1.5rem;font-size:.95rem;line-height:1.5}
  .drop{border:2px dashed #444;border-radius:1rem;padding:2.5rem 1.5rem;text-align:center;cursor:pointer;transition:.2s;margin-bottom:1.5rem;background:#0f0f0f}
  .drop:hover,.drop.hover{border-color:#f7a50b;background:#1a1205}
  .drop p{margin:0;font-size:1rem;color:#ccc}
  .list{display:grid;gap:.4rem}
  .item{display:flex;align-items:center;gap:.75rem;padding:.65rem 1rem;background:#151515;border-radius:.5rem;font-size:.9rem}
  .dot{width:10px;height:10px;border-radius:50%;background:#333;flex:0 0 auto}
  .dot.ok{background:#5db85d}
  .dot.err{background:#d9534f}
  .size{margin-left:auto;color:#777;font-size:.8rem}
  .status{margin-top:1.5rem;padding:1rem 1.25rem;background:#151515;border-radius:.5rem;font-size:.95rem;line-height:1.4}
  .done{color:#5db85d;font-weight:600}
  .warn{color:#f7a50b}
  input[type=file]{display:none}
  button{background:#1a1a1a;color:#eaeaea;border:1px solid #333;border-radius:.4rem;padding:.5rem 1rem;cursor:pointer;font:inherit}
  button:hover{background:#262626}
  .row{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap}
</style>
</head>
<body>
<h1>Парсер уроков Crypto OS</h1>
<p class="sub">Перетяни 8 файлов .docx — скрипт распарсит их и сохранит в память браузера. После этого возвращайся в чат и скажи Клод «готово», она сама заберёт и зальёт в репозиторий.</p>
<label class="drop" id="drop">
  <p>Кинь сюда 8 .docx (или нажми)</p>
  <input type="file" id="f" multiple accept=".docx">
</label>
<div class="list" id="list"></div>
<div class="status" id="status">Ожидаю файлы…</div>
<div class="row">
  <button id="reset">Очистить</button>
</div>
<script src="/jszip.min.js"></script>
<script>
(function(){
  var drop = document.getElementById('drop');
  var listEl = document.getElementById('list');
  var statusEl = document.getElementById('status');
  var input = document.getElementById('f');
  var resetBtn = document.getElementById('reset');

  drop.addEventListener('click', function(){ input.click(); });
  drop.addEventListener('dragover', function(e){ e.preventDefault(); drop.classList.add('hover'); });
  drop.addEventListener('dragleave', function(){ drop.classList.remove('hover'); });
  drop.addEventListener('drop', function(e){
    e.preventDefault(); drop.classList.remove('hover');
    if (e.dataTransfer.files) handleFiles(e.dataTransfer.files);
  });
  input.addEventListener('change', function(e){ handleFiles(e.target.files); });
  resetBtn.addEventListener('click', function(){
    localStorage.removeItem('ciacademy_lessons');
    localStorage.removeItem('ciacademy_lessons_ts');
    window.lessonTexts = null;
    listEl.innerHTML = '';
    statusEl.textContent = 'Очищено.';
  });

  async function parseDocx(file){
    var buf = await file.arrayBuffer();
    var zip = await JSZip.loadAsync(buf);
    var xmlFile = zip.file('word/document.xml');
    if (!xmlFile) throw new Error('no word/document.xml');
    var xml = await xmlFile.async('text');
    var doc = new DOMParser().parseFromString(xml, 'application/xml');
    var paragraphs = doc.getElementsByTagName('w:p');
    var out = [];
    for (var i=0; i<paragraphs.length; i++){
      var p = paragraphs[i];
      var runs = p.getElementsByTagName('w:t');
      var text = '';
      for (var j=0; j<runs.length; j++) text += runs[j].textContent || '';
      var pStyle = p.getElementsByTagName('w:pStyle')[0];
      var styleVal = pStyle && pStyle.getAttribute('w:val');
      if (styleVal && /Heading1/i.test(styleVal)) out.push('# ' + text);
      else if (styleVal && /Heading2/i.test(styleVal)) out.push('## ' + text);
      else if (styleVal && /Heading3/i.test(styleVal)) out.push('### ' + text);
      else if (text.trim()) out.push(text);
    }
    return out.join('\n\n');
  }

  async function handleFiles(files){
    var arr = Array.from(files).filter(function(f){ return f.name.toLowerCase().endsWith('.docx'); });
    if (!arr.length){ statusEl.innerHTML = '<span class="warn">Нет .docx среди выбранных</span>'; return; }
    listEl.innerHTML = '';
    statusEl.textContent = 'Парсим ' + arr.length + '…';
    var result = {};
    for (var i=0; i<arr.length; i++){
      var f = arr[i];
      var row = document.createElement('div'); row.className = 'item';
      var dot = document.createElement('div'); dot.className = 'dot';
      var name = document.createElement('div'); name.textContent = f.name;
      var size = document.createElement('div'); size.className = 'size'; size.textContent = '…';
      row.append(dot, name, size);
      listEl.appendChild(row);
      try {
        var txt = await parseDocx(f);
        result[f.name] = txt;
        dot.classList.add('ok');
        size.textContent = txt.length.toLocaleString('ru-RU') + ' симв.';
      } catch(e){
        dot.classList.add('err');
        size.textContent = 'ошибка: ' + (e.message || e);
      }
    }
    window.lessonTexts = result;
    try {
      localStorage.setItem('ciacademy_lessons', JSON.stringify(result));
      localStorage.setItem('ciacademy_lessons_ts', String(Date.now()));
    } catch(e){}
    var done = Object.keys(result).length;
    statusEl.innerHTML = done === arr.length && arr.length
      ? '<span class="done">✓ ' + done + ' уроков распарсено и сохранено в браузере. Возвращайся в чат.</span>'
      : '<span class="warn">Обработано ' + done + ' из ' + arr.length + '</span>';
  }

  try {
    var cached = localStorage.getItem('ciacademy_lessons');
    if (cached){
      var data = JSON.parse(cached);
      window.lessonTexts = data;
      var names = Object.keys(data);
      statusEl.innerHTML = '<span class="done">✓ В браузере уже сохранено ' + names.length + ' уроков. Можно перезагрузить новыми файлами.</span>';
      names.forEach(function(n){
        var row = document.createElement('div'); row.className = 'item';
        var dot = document.createElement('div'); dot.className = 'dot ok';
        var nm = document.createElement('div'); nm.textContent = n;
        var sz = document.createElement('div'); sz.className = 'size'; sz.textContent = data[n].length.toLocaleString('ru-RU') + ' симв.';
        row.append(dot, nm, sz); listEl.appendChild(row);
      });
    }
  } catch(e){}
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Converter</title>
<script src="/jszip.min.js"></script>
<style>
body{font-family:system-ui,sans-serif;padding:20px;max-width:900px;margin:0 auto;background:#0b0f1a;color:#e6edf3}
h1{font-size:18px;margin:0 0 8px}
p{margin:0 0 12px;font-size:14px;color:#9fb2c8}
button{background:#7c5cff;color:#fff;border:0;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;margin:4px 8px 4px 0}
button.secondary{background:#253048}
button:hover{opacity:.9}
#f{margin:8px 0}
#status{white-space:pre-wrap;font-size:12px;padding:10px;background:#111826;border-radius:6px;max-height:220px;overflow:auto;margin:10px 0;border:1px solid #253048}
#counter{font-size:13px;color:#7c5cff;font-weight:700;margin:8px 0}
textarea{width:100%;min-height:240px;background:#0a0e17;color:#e6edf3;border:1px solid #253048;border-radius:6px;padding:10px;font-family:monospace;font-size:11px;box-sizing:border-box}
</style>
</head>
<body>
<h1>Lesson uploader for Nova</h1>
<p>Select ALL 8 .docx files AT ONCE (Ctrl+A in the picker). Files added in separate selections also accumulate. When counter shows 8/8 - click COPY ALL.</p>
<input type="file" id="f" multiple accept=".docx">
<div id="counter">0 / 8 files loaded</div>
<div id="status">Waiting for files...</div>
<button id="copyBtn" style="display:none">COPY ALL</button>
<button id="resetBtn" class="secondary">RESET</button>
<textarea id="json" style="display:none" readonly></textarea>
<script>
window.results = {};
function render(){
  const n = Object.keys(window.results).length;
  document.getElementById("counter").textContent = n + " / 8 files loaded";
  const btn = document.getElementById("copyBtn");
  const ta = document.getElementById("json");
  if (n > 0) {
    ta.value = JSON.stringify(window.results);
    ta.style.display = "block";
    btn.style.display = "inline-block";
  } else {
    ta.style.display = "none";
    btn.style.display = "none";
  }
}
async function parseDocx(file){
  const buf = await file.arrayBuffer();
  const zip = await JSZip.loadAsync(buf);
  const xml = await zip.file("word/document.xml").async("string");
  const doc = new DOMParser().parseFromString(xml, "application/xml");
  const ps = doc.getElementsByTagName("w:p");
  const out = [];
  for (const p of ps) {
    const runs = p.getElementsByTagName("w:t");
    let t = "";
    for (const r of runs) t += r.textContent || "";
    const ps1 = p.getElementsByTagName("w:pStyle")[0];
    const sv = ps1 && ps1.getAttribute("w:val");
    if (sv && /Heading1/i.test(sv)) out.push("# " + t);
    else if (sv && /Heading2/i.test(sv)) out.push("## " + t);
    else if (sv && /Heading3/i.test(sv)) out.push("### " + t);
    else if (t.trim()) out.push(t);
  }
  return out.join("\n\n");
}
document.getElementById("f").addEventListener("change", async (e) => {
  const st = document.getElementById("status");
  st.textContent = "Parsing " + e.target.files.length + " new files...\n";
  for (const file of e.target.files) {
    try {
      const text = await parseDocx(file);
      window.results[file.name] = text;
      st.textContent += "[OK] " + file.name + " -> " + text.length + " chars\n";
    } catch (err) {
      st.textContent += "[ERR] " + file.name + ": " + err.message + "\n";
    }
  }
  st.textContent += "DONE. Files in memory: " + Object.keys(window.results).length;
  render();
  e.target.value = "";
});
document.getElementById("copyBtn").addEventListener("click", async () => {
  const ta = document.getElementById("json");
  try {
    await navigator.clipboard.writeText(ta.value);
    document.getElementById("copyBtn").textContent = "COPIED!";
  } catch(e) {
    ta.select(); document.execCommand("copy");
    document.getElementById("copyBtn").textContent = "COPIED!";
  }
});
document.getElementById("resetBtn").addEventListener("click", () => {
  window.results = {};
  document.getElementById("status").textContent = "Reset. Waiting for files...";
  render();
});
render();
</script>
</body>
</html>
